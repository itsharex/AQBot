# Release Drafter configuration
# Docs: https://github.com/release-drafter/release-drafter

name-template: 'AQBot v$RESOLVED_VERSION'
tag-template: 'v$RESOLVED_VERSION'

template: |
  ## 🎉 AQBot $RESOLVED_VERSION

  $CHANGES

  **Full Changelog**: https://github.com/$OWNER/$REPOSITORY/compare/$PREVIOUS_TAG...v$RESOLVED_VERSION

categories:
  - title: '🚀 新功能'
    labels:
      - feature
      - enhancement
  - title: '🐛 Bug 修复'
    labels:
      - bug
      - fix
      - bugfix
  - title: '🎨 界面优化'
    labels:
      - ui
      - design
      - style
  - title: '⚡ 性能提升'
    labels:
      - performance
  - title: '📦 依赖更新'
    labels:
      - dependencies
      - deps
  - title: '🔒 安全'
    labels:
      - security
  - title: '📝 文档'
    labels:
      - documentation
      - docs
  - title: '🔧 其他'
    labels:
      - chore
      - refactor
      - ci

change-template: '- $TITLE (#$NUMBER) @$AUTHOR'
change-title-escapes: '\<*_&'

exclude-labels:
  - skip-changelog

version-resolver:
  major:
    labels:
      - major
      - breaking
  minor:
    labels:
      - minor
      - feature
      - enhancement
  patch:
    labels:
      - patch
      - bug
      - fix
      - bugfix
  default: patch

autolabeler:
  - label: 'feature'
    title:
      - '/^feat[\(:]/'
  - label: 'bug'
    title:
      - '/^fix[\(:]/'
  - label: 'chore'
    title:
      - '/^chore[\(:]/'
  - label: 'documentation'
    title:
      - '/^docs[\(:]/'
  - label: 'style'
    title:
      - '/^style[\(:]/'
  - label: 'refactor'
    title:
      - '/^refactor[\(:]/'
  - label: 'performance'
    title:
      - '/^perf[\(:]/'
  - label: 'ci'
    title:
      - '/^ci[\(:]/'
